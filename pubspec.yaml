name: inggo
description: VTC Moto-taxi à Djibouti
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.0

  # Environment
  flutter_dotenv: ^5.2.1

  # UI
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  pinput: ^5.0.0

  # Storage
  shared_preferences: ^2.2.2

  # Media
  image_picker: ^1.0.7

  # Connectivity
  connectivity_plus: ^6.0.0

  # Utils
  logger: ^2.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: false

  assets:
    - .env
    - assets/images/
    # - assets/animations/  # Uncomment when adding Lottie/animation files
