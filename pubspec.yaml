name: inggo
description: VTC Moto-taxi à Djibouti
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Environment
  flutter_dotenv: ^5.2.1

  # UI
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  pinput: ^5.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  flutter_local_notifications: ^18.0.0

  # Storage & Security
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Media
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1

  # Connectivity
  connectivity_plus: ^6.0.0

  # Utils
  logger: ^2.0.0
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
