{% extends "base.html" %}
{% set active_page = 'notifications' %}

{% block title %}Inggo Admin - Notifications{% endblock %}

{% block content %}
<header class="top-bar"><h1>Envoyer une Notification</h1></header>
<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>Destinataire</label>
            <select name="target">
                <option value="all">Tous les utilisateurs</option>
                <option value="drivers">Tous les chauffeurs</option>
            </select>
        </div>
        <div class="form-group">
            <label>Titre</label>
            <input type="text" name="title" placeholder="Titre de la notification" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="body" rows="4" placeholder="Contenu de la notification" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Envoyer</button>
    </form>
</div>
{% endblock %}
